version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: supplysync_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: supplysync_db
      POSTGRES_USER: supplysync_user
      POSTGRES_PASSWORD: supplysync_pass
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: supplysync_redis
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    container_name: supplysync_celery_worker
    command: celery -A supplysync worker -l info
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=supplysync.settings.development
      - DATABASE_URL=postgres://supplysync_user:supplysync_pass@postgres:5432/supplysync_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - redis

  celery_beat:
    build: .
    container_name: supplysync_celery_beat
    command: celery -A supplysync beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=supplysync.settings.development
      - DATABASE_URL=postgres://supplysync_user:supplysync_pass@postgres:5432/supplysync_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
